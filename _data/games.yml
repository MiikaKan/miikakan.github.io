featured:
  - title: "Wardrum"
    kicker: "Mopeful Games (2026)"
    image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2680670/757474155250659dc1aff0a30e10c920f38885d5/header.jpg?t=1778253606"
    image_alt: "Wardrum Steam header art"
    summary: "A commercial Steam project released in 2026. I was responsible for the full technical implementation of the game as the lead and only developer."
    role: "Lead Developer"
    engine: "Unity"
    platforms: "Steam"
    highlights:
      - title: "Roguelike mechanics"
        text: "Built map generation, progression systems, and a modular framework for random events."
      - title: "Tactics mechanics"
        text: "Developed weighted enemy AI and a modular behaviour system for creating unit abilities."
      - title: "Rhythm mechanics"
        text: "Implemented an input-driven rhythm system using FMOD that supports multiple gameplay effects."
    links:
      - label: "Steam"
        url: "https://store.steampowered.com/app/2680670"
  - title: "Fashion Police Squad"
    kicker: "Mopeful Games (2022)"
    image: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1319460/header.jpg?t=1760086773"
    image_alt: "Fashion Police Squad Steam header art"
    summary: "A commercial Steam project released in 2022. I worked as the lead and only developer, owning the technical implementation."
    role: "Lead Developer"
    engine: "Unity"
    platforms: "Steam, XBOX, Nintendo Switch, Playstation"
    highlights:
      - title: "FPS mechanics"
        text: "Implemented core FPS gameplay systems with weapon and enemy interactions built around the game's fashion-police theme."
      - title: "Enemy and boss AI"
        text: "Developed enemy behaviours and boss mechanics for combat encounters with distinct rules and patterns."
      - title: "Car-chase sequence"
        text: "Built a car-chase level where the player fights from the roof of an automatically moving car, clearing enemy waves across looping road sections while traffic uses lane logic and raycasts to avoid collisions."
    links:
      - label: "Steam"
        url: "https://store.steampowered.com/app/1319460"

